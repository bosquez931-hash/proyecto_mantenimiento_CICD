name: Inspector QA - Sensor Hidráulico LH514

on: [push]

jobs:
  auditar_codigo:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar mi código del repositorio
        uses: actions/checkout@v4

      - name: Instalar Python 3.10 en el servidor
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Correr el Tester Automático
        run: python test_sensor.py
